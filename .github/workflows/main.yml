name: CI

on:
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4  # обновил с v3

    - name: Install deps
      run: npm install

    - name: Build
      run: npm run build

  notify-telegram:
    runs-on: ubuntu-latest
    needs: build  # ждёт окончания билда
    if: always()
    steps:
    - name: Send Telegram Notification
      uses: appleboy/telegram-action@v0.1.8
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 **CI Pipeline завершён**
          
          **Репозиторий**: ${{ github.repository }}
          **Бранч**: ${{ github.ref_name }}
          **Коммит**: ${{ github.sha }}
          **Статус**: ${{ job.status }}
          **Автор**: ${{ github.actor }}
          
          🔗 [Посмотреть коммит](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
